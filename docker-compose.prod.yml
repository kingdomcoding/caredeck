services:
  db:
    image: postgres:16-alpine
    env_file: .env.prod
    volumes:
      - prod_db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 12

  web:
    build:
      context: .
      target: runner
    image: caredeck:latest
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:4080:4000"
    networks:
      - default
      - npm_default
    restart: unless-stopped
    command: ["/app/bin/caredeck", "start"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/healthz"]
      interval: 15s
      retries: 6

  worker:
    image: caredeck:latest
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: ["/app/bin/caredeck", "start"]
    environment:
      ROLE: "worker"

  minio:
    image: minio/minio:latest
    env_file: .env.prod
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      retries: 6

networks:
  default:
  npm_default:
    external: true

volumes:
  prod_db:
  minio-data:
